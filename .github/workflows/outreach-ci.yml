name: Outreach Engine CI

on:
  push:
    paths:
      - "outreach-engine/**"
      - ".github/workflows/outreach-ci.yml"
  pull_request:
    paths:
      - "outreach-engine/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install requests beautifulsoup4 lxml pytest

      - name: Run tests
        run: .venv/bin/python -m pytest outreach-engine/test_outreach.py -v

      - name: CLI smoke test
        run: .venv/bin/python outreach-engine/outreach_engine.py --help
