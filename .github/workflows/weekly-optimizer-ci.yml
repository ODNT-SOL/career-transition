name: Weekly Optimizer CI

on:
  push:
    paths:
      - "weekly-optimizer/**"
      - ".github/workflows/weekly-optimizer-ci.yml"
  pull_request:
    paths:
      - "weekly-optimizer/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pytest reportlab

      - name: Run tests
        run: .venv/bin/python -m pytest weekly-optimizer/test_optimizer.py -v

      - name: CLI smoke test
        run: .venv/bin/python weekly-optimizer/optimizer.py --help
