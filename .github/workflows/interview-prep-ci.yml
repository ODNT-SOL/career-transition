name: Interview Prep CI

on:
  push:
    paths:
      - "interview-prep/**"
      - ".github/workflows/interview-prep-ci.yml"
  pull_request:
    paths:
      - "interview-prep/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pytest reportlab

      - name: Run tests
        run: .venv/bin/python -m pytest interview-prep/test_prep.py -v

      - name: CLI smoke test
        run: .venv/bin/python interview-prep/interview_prep.py --help
